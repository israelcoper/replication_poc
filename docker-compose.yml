version: "3.8"

services:
  db01:
    image: postgres:16.1
    container_name: db01
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54321:5432"
    volumes:
      - db01_data:/var/lib/postgresql/data
      - ./init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=10
        -c max_replication_slots=10
        -c hot_standby=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - replication-net

  db02:
    image: postgres:16.1
    container_name: db02
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54322:5432"
    volumes:
      - db02_data:/var/lib/postgresql/data
      - ./init-replica.sh:/init-replica.sh
    entrypoint: /bin/bash
    command: /init-replica.sh
    depends_on:
      db01:
        condition: service_healthy
    networks:
      - replication-net

volumes:
  db01_data:
  db02_data:

networks:
  replication-net:
    driver: bridge
